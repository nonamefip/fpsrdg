name: Aggiorna Dashboard FIP Sardegna

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/template.html'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modalità scraper'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal         # aggiornamento giornaliero (default anche per deploy.bat)
          - full-refresh   # riscarica tutto dall'inizio
          - all-provv      # riscarica TUTTI i provvedimenti mancanti
          - reprovv        # provvedimenti ultimi 21gg
          - national       # solo scraper nazionale
  schedule:
    - cron: '30 2 * * *'   # ogni notte alle 2:30

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dipendenze Python
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Scarica dati FIP (normale)
        if: >
          github.event_name == 'push' ||
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && inputs.mode == 'normal')
        run: python scripts/fip_scraper.py --refresh-days 7

      - name: Scarica dati FIP (full-refresh)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'full-refresh' }}
        run: python scripts/fip_scraper.py --full-refresh

      - name: Scarica dati FIP (all-provv)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'all-provv' }}
        run: python scripts/fip_scraper.py --all-provv

      - name: Scarica dati FIP (reprovv)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'reprovv' }}
        run: python scripts/fip_scraper.py --reprovv

      - name: Scarica dati nazionali
        if: >
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && inputs.mode == 'national') ||
          (github.event_name == 'workflow_dispatch' && inputs.mode == 'normal')
        run: python scripts/fip_national_scraper.py

      - name: Salva cache su GitHub
        run: |
          git config user.name "FIP Bot"
          git config user.email "fipbot@noreply.github.com"
          git add cache/fip_sardegna_cache.json || true
          git add cache/fip_national_cache.json || true
          git diff --staged --quiet || git commit -m "Cache aggiornata $(date '+%Y-%m-%d %H:%M')"
          git push || true

      - name: Genera dati JSON
        run: python scripts/gen_data.py

      - name: Salva JSON su GitHub
        run: |
          git add cache/data_v5_new.json || true
          git diff --staged --quiet || git commit -m "Dati aggiornati $(date '+%Y-%m-%d %H:%M')"
          git push || true

      - name: Genera dashboard HTML
        run: python scripts/build.py

      - name: Deploy su GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
