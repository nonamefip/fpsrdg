name: 🏀 Aggiorna Dashboard FIP Sardegna

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 📥 Scarica il repository
        uses: actions/checkout@v4

      - name: 🐍 Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Installa librerie
        run: pip install requests beautifulsoup4 lxml

      - name: 🌐 Scarica gare da fip.it
        run: python scripts/fip_scraper.py --future-days 14
        env:
          PYTHONUNBUFFERED: '1'

      - name: ⚙️ Calcola statistiche
        run: python scripts/gen_data.py

      - name: 🔨 Compila dashboard HTML
        run: python scripts/build.py

      - name: 💾 Salva dati aggiornati
        run: |
          git config user.name "FIP Bot"
          git config user.email "fip-bot@users.noreply.github.com"
          git add cache/ docs/
          git diff --staged --quiet || git commit -m "🏀 Aggiornamento $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: 🚀 Pubblica su GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
