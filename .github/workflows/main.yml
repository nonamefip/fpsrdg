name: Aggiorna Dashboard FIP Sardegna

on:
  # ── Trigger automatico: parte quando si fa push di template.html su main
  push:
    branches:
      - main
    paths:
      - 'scripts/template.html'

  # ── Trigger manuale: resta disponibile come prima
  workflow_dispatch:

  # ── Trigger schedulato: ogni notte alle 02:30 (UTC) per aggiornare i dati FIP
  schedule:
    - cron: '30 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dipendenze Python
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Scarica dati FIP
        run: python scripts/fip_scraper.py

      - name: Genera dati JSON
        run: python scripts/gen_data.py

      - name: Genera dashboard HTML
        run: python scripts/build.py

      - name: Deploy su GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
