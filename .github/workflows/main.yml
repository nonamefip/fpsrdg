name: Aggiorna Dashboard FIP Sardegna
on:
  push:
    branches:
      - main
    paths:
      - 'scripts/template.html'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modalità scraper'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal          # aggiornamento giornaliero (default)
          - full-refresh    # riscarica tutto dall'inizio
          - national        # scarica gare nazionali (arbitri/squadre sarde)
          - national-full   # scarica gare nazionali da zero
  schedule:
    - cron: '30 2 * * *'
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache dipendenze Python
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Installa dipendenze
        run: pip install -r requirements.txt

      # ── Scraper RSA ──
      - name: Scarica dati FIP RSA (normale)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'normal' }}
        run: python scripts/fip_scraper.py --refresh-days 21
      - name: Scarica dati FIP RSA (full-refresh)
        if: ${{ inputs.mode == 'full-refresh' }}
        run: python scripts/fip_scraper.py --full-refresh

      # ── Scraper Nazionale ──
      - name: Scarica dati nazionali (normale)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'normal' }}
        run: python scripts/fip_national_scraper.py
      - name: Scarica dati nazionali (full)
        if: ${{ inputs.mode == 'national' }}
        run: python scripts/fip_national_scraper.py
      - name: Scarica dati nazionali (full-refresh)
        if: ${{ inputs.mode == 'national-full' }}
        run: python scripts/fip_national_scraper.py --full-refresh

      # ── Build ──
      - name: Genera dati JSON
        run: python scripts/gen_data.py
      - name: Genera dashboard HTML
        run: python scripts/build.py
      - name: Deploy su GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
